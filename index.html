<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Invite! 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #1e9eff;
      --yellow:  #ffd93d;
      --teal:    #06d6a0;
      --purple:  #38c9f5;
      --orange:  #43c6ff;
      --bg:      #f0f8ff;
      --card:    #ffffff;
      --text:    #1a2d3d;
      --muted:   #6a8aaa;
    }

    /* ── Confetti canvas ── */
    #confetti-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      position: relative;
      overflow-x: hidden;
    }

    /* floating balloons background */
    .balloons-bg {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .balloon {
      position: absolute;
      bottom: -120px;
      border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
      animation: floatUp linear infinite;
      opacity: 0.18;
    }
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -18px; left: 50%;
      transform: translateX(-50%);
      width: 1.5px; height: 20px;
      background: currentColor;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-3deg); opacity: 0; }
      10%  { opacity: 0.18; }
      90%  { opacity: 0.18; }
      100% { transform: translateY(-110vh) rotate(3deg); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border-radius: 28px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      max-width: 540px;
      width: 100%;
      overflow: hidden;
      animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(40px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ── Banner strip ── */
    .banner {
      background: linear-gradient(135deg, #1e9eff 0%, #06d6a0 50%, #ffd93d 100%);
      padding: 1.5rem 1.5rem 0;
      text-align: center;
      position: relative;
    }
    .banner-emoji {
      font-size: 2.6rem;
      display: block;
      animation: wiggle 1.2s ease-in-out infinite alternate;
    }
    @keyframes wiggle {
      from { transform: rotate(-8deg) scale(1); }
      to   { transform: rotate(8deg) scale(1.12); }
    }
    .banner h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      color: #fff;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.12);
      margin: 0.3rem 0 0.1rem;
      line-height: 1.15;
    }
    .banner p.subtitle {
      color: rgba(255,255,255,0.92);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 1.2rem;
    }

    /* ── Invitation image ── */
    .invite-img-wrap {
      background: linear-gradient(135deg, #1e9eff, #06d6a0, #ffd93d);
      padding: 4px;
    }
    .invite-img-wrap img {
      width: 100%;
      display: block;
      max-height: 320px;
      object-fit: cover;
    }
    /* placeholder shown when no image is set */
    .img-placeholder {
      width: 100%;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0f4ff, #e8fff8);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      gap: 0.5rem;
      padding: 2rem;
      text-align: center;
    }
    .img-placeholder .cam { font-size: 3rem; }

    /* ── RSVP form ── */
    .form-section {
      padding: 1.2rem 1.8rem 1.8rem;
    }
    .form-section h2 {
      font-family: 'Pacifico', cursive;
      font-size: 1.4rem;
      color: var(--pink);
      margin-bottom: 1.1rem;
      text-align: center;
    }

    .field {
      margin-bottom: 1rem;
    }
    .field label {
      display: block;
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 0.35rem;
    }
    .field label .required { color: var(--pink); margin-left: 2px; }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 0.72rem 1rem;
      border: 2.5px solid #c2e4ff;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(30,158,255,0.15);
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .counter-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      border: 2.5px solid #c2e4ff;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }
    .counter-wrap button {
      width: 44px; height: 44px;
      border: none; background: none; cursor: pointer;
      font-size: 1.4rem; font-weight: 800; color: var(--pink);
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .counter-wrap button:hover { background: #e8f6ff; }
    .counter-wrap .count-display {
      flex: 1; text-align: center;
      font-weight: 800; font-size: 1.05rem; color: var(--text);
    }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      margin-top: 1.1rem;
      padding: 0.95rem;
      background: linear-gradient(135deg, #1e9eff, #06d6a0);
      color: #fff;
      font-family: 'Pacifico', cursive;
      font-size: 1.2rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(30,158,255,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(30,158,255,0.45); }
    .btn-submit:active { transform: translateY(0); }

    /* ── Success state ── */
    .success-box {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.8rem;
      text-align: center;
      gap: 0.6rem;
    }
    .success-box .big-emoji { font-size: 4rem; animation: pop 0.5s cubic-bezier(.22,1,.36,1) both; }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    .success-box h3 { font-family: 'Pacifico', cursive; font-size: 1.8rem; color: var(--pink); }
    .success-box p { font-size: 0.97rem; color: var(--muted); font-weight: 600; max-width: 320px; }
    .summary-pill {
      background: linear-gradient(135deg, #e8f6ff, #e8fff8);
      border-radius: 50px;
      padding: 0.55rem 1.3rem;
      font-weight: 800;
      font-size: 0.92rem;
      color: var(--text);
      margin-top: 0.4rem;
      border: 2px solid #c2e4ff;
    }

    /* ── Footer ── */
    .card-footer {
      background: linear-gradient(135deg, #1e9eff, #06d6a0);
      padding: 0.75rem;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.85);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    @media (max-width: 460px) {
      .details { grid-template-columns: 1fr; }
      .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="balloons-bg" id="balloonsBg"></div>

<div class="card">

  <!-- Banner -->
  <div class="banner">
    <span class="banner-emoji">🎂</span>
    <h1>You're Invited!</h1>
    <p class="subtitle">Come celebrate with us ✨</p>
  </div>

  <!-- Invitation Image -->
  <div class="invite-img-wrap">
    <!--
      TO USE YOUR OWN IMAGE:
      1. Place your image file (e.g. party.jpg) in the same folder as this index.html
      2. Replace the img-placeholder div below with:
         <img src="party.jpg" alt="Birthday Invitation" />
    -->
    
	<img src="partyInvite3.PNG" alt="Birthday Invitation" />
    
  </div>


  <!-- RSVP Form -->
  <div class="form-section" id="formSection">
    <h2>Will you be there? 🥳</h2>

    <div class="field">
      <label>Your Name <span class="required">*</span></label>
      <input type="text" id="parentName" placeholder="your name" autocomplete="off" />
    </div>

    <div class="row-2">
      <div class="field">
        <label>Number of Kids 🧒</label>
        <div class="counter-wrap">
          <button type="button" onclick="changeCount('kids',-1)">−</button>
          <span class="count-display" id="kidsDisplay">0</span>
          <button type="button" onclick="changeCount('kids',1)">+</button>
        </div>
      </div>
      <div class="field">
        <label>Number of Adults including u 👨‍👩</label>
        <div class="counter-wrap">
          <button type="button" onclick="changeCount('adults',-1)">−</button>
          <span class="count-display" id="adultsDisplay">1</span>
          <button type="button" onclick="changeCount('adults',1)">+</button>
        </div>
      </div>
    </div>

    <button class="btn-submit" onclick="submitRSVP()">🎉 Count Me In!</button>
  </div>

  <!-- Success -->
  <div class="success-box" id="successBox">
    <span class="big-emoji">🎊</span>
    <h3>Woohoo!</h3>
    <p>Thanks for your RSVP! We can't wait to celebrate with you.</p>
    <div class="summary-pill" id="summaryPill"></div>
    <p style="font-size:0.82rem;margin-top:0.8rem">See you at the party! 🥳🎈</p>
  </div>

  <div class="card-footer">
    🎀 &nbsp; Please RSVP by <span id="rsvpDeadline">Edit in code</span> &nbsp; 🎀
  </div>

</div>

<script>
  /* ═══════════════════════════════════════════════
     ✏️  CUSTOMIZE YOUR PARTY DETAILS HERE
  ═══════════════════════════════════════════════ */
  const PARTY = {
    name:        "Lakshay Agarwal",          // Birthday child's name
    age:         "10 years old 🌟",       // Age / milestone
    birthday:    "June 14, 2016",        // Actual birthday (read-only display)
    date:        "Saturday, May 29, 2026 · 6:00 PM",  // Party date
    venue:       "Sky Zone Roswell",
    rsvpBy:      "May 26, 2026",
    // Google Sheets webhook (optional — see README below)
    // Set to "" to skip, responses will only show confirmation
    sheetsWebhook: "https://script.google.com/macros/s/AKfycbz2BgrwVyoCK8pKUAHImB0rhYx40X4X6S_GKJJN0p3kKo-gVaMyeBMiEI1W2wsnFRJNaA/exec"
  };
  /* ═══════════════════════════════════════════════ */

  // Populate details
  document.getElementById('rsvpDeadline').textContent = PARTY.rsvpBy;

  // Counter state
  const counts = { kids: 0, adults: 1 };
  function changeCount(type, delta) {
    counts[type] = Math.max(0, counts[type] + delta);
    document.getElementById(type + 'Display').textContent = counts[type];
  }

  // Submit
  function submitRSVP() {
    const name = document.getElementById('parentName').value.trim();
    if (!name) {
      document.getElementById('parentName').focus();
      document.getElementById('parentName').style.borderColor = '#ff6b9d';
      setTimeout(() => document.getElementById('parentName').style.borderColor = '#ffe0ef', 1500);
      return;
    }
    const payload = {
      name,
      kids:   counts.kids,
      adults: counts.adults,
      timestamp: new Date().toISOString()
    };

    // Optional: send to Google Sheets
    if (PARTY.sheetsWebhook) {
      fetch(PARTY.sheetsWebhook, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(() => {});
    }

    // Show success
    document.getElementById('formSection').style.display = 'none';
    const box = document.getElementById('successBox');
    box.style.display = 'flex';
    document.getElementById('summaryPill').textContent =
      `${name} · ${counts.kids} kid${counts.kids!==1?'s':''} · ${counts.adults} adult${counts.adults!==1?'s':''}`;

    launchConfetti();
  }

  /* ── Balloon background ── */
  const colors = ['#1e9eff','#ffd93d','#06d6a0','#38c9f5','#43c6ff','#74d7ff'];
  const bg = document.getElementById('balloonsBg');
  for (let i = 0; i < 14; i++) {
    const b = document.createElement('div');
    b.className = 'balloon';
    const size = 40 + Math.random() * 50;
    const color = colors[i % colors.length];
    b.style.cssText = `
      width:${size}px; height:${size*1.2}px;
      left:${Math.random()*100}%;
      background:${color}; color:${color};
      animation-duration:${8+Math.random()*12}s;
      animation-delay:${-Math.random()*20}s;
    `;
    bg.appendChild(b);
  }

  /* ── Canvas confetti ── */
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const pieces = [];
    const confColors = ['#1e9eff','#ffd93d','#06d6a0','#38c9f5','#43c6ff','#74d7ff','#ffffff'];
    for (let i = 0; i < 180; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        w: 6 + Math.random() * 9,
        h: 10 + Math.random() * 14,
        color: confColors[Math.floor(Math.random() * confColors.length)],
        rot: Math.random() * Math.PI * 2,
        vx: (Math.random() - 0.5) * 3,
        vy: 2 + Math.random() * 4,
        vrot: (Math.random() - 0.5) * 0.2,
        alpha: 1
      });
    }
    let frame;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
        if (p.y > canvas.height * 0.7) p.alpha -= 0.02;
        if (p.alpha > 0) { alive = true; }
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if (alive) frame = requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    if (frame) cancelAnimationFrame(frame);
    draw();
  }
</script>

</body>
</html>
